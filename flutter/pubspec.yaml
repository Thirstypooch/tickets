name: cribs_flutter
description: "CRIBS - Premium Property Rental Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Models / Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # HTTP Client
  dio: ^5.7.0

  # Network Images
  cached_network_image: ^3.4.1

  # Animations
  flutter_animate: ^4.5.2

  # Icons
  lucide_icons: ^0.257.0

  # Fonts
  google_fonts: ^6.2.1

  # Image Gallery
  photo_view: ^0.15.0

  # Shimmer Loading
  shimmer: ^3.0.0

  # Date utilities
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
